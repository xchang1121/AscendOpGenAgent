# Framework reference tables. Loaded once per process by settings.py.

# Common hallucinated script names → the real script Claude should use.
# hook_guard_bash flags these early with a targeted error rather than a
# generic "unknown script" rejection.
hallucinated_scripts:
  eval.py: baseline.py
  run_eval.py: baseline.py
  verify.py: baseline.py
  check.py: quick_check.py
  run.py: baseline.py
  test.py: quick_check.py
  profile.py: baseline.py


# Remote worker SSH dispatch — used by
#   `python scripts/ar_cli.py worker --remote-host <alias> ...`
#
# Each alias under `hosts:` describes a machine ar_cli can SSH into and
# launch a worker daemon on. The alias name is also the ssh hostname
# unless `ssh_alias:` overrides it. `repo_path` is required and must
# point at the remote `autoresearch/` directory (NOT the outer
# AscendOpGenAgent checkout) — the SSH command does
# `cd <repo_path> && python scripts/ar_cli.py worker --start ...`.
# `env_script` is sourced before invoking the remote ar_cli. `python`
# defaults to "python".
#
# The CLI handles tunnel setup itself: on --start it opens
# `ssh -L <port>:127.0.0.1:<port> <alias> -N -f` and stashes the pid in
# ~/.autoresearch_state/tunnels/<port>.pid, so subsequent --status /
# --stop / orchestrator --worker-url 127.0.0.1:<port> transparently
# hit the remote daemon.
#
# Example (uncomment + edit before use):
#
# remote_worker:
#   hosts:
#     my-npu:
#       repo_path: /home/<user>/AscendOpGenAgent/autoresearch
#       env_script: /home/<user>/env.sh
#       python: python
#       ssh_alias: my-npu              # optional; defaults to the key
remote_worker:
  hosts: {}


# ---------------------------------------------------------------------------
# Tunable knobs. config.yaml is the SINGLE SOURCE OF TRUTH — settings.py has
# NO in-code defaults, so every key below is REQUIRED and a missing key is a
# hard error. Retune by editing the values here.
# ---------------------------------------------------------------------------

# Task defaults applied when a task.yaml (or scaffold CLI) omits the field.
# Precedence for these: task.yaml > this config > (no in-code default).
defaults:
  max_rounds: 30          # optimization-round budget for a new/under-specified task
  eval_timeout: 600       # per-shape verify/profile budget (seconds); scaled by num_cases
  smoke_test_timeout: 10  # quick_check smoke-test budget (seconds)
  code_checker_enabled: true   # run the triton-impl AST regression check by default
  metric:                 # primary optimization metric (scaffold writes it; loader falls back here)
    primary: latency_us
    lower_is_better: true
    improvement_threshold: 0.0

# Eval timing measurement. Read where the timing runs: on remote eval the
# WORKER's config.yaml applies.
eval:
  warmup: 10        # untimed warmup iterations before measurement
  repeats: 100      # measured iterations averaged per shape

# Remote worker daemon. Single source for both the ar_cli tunnel/status
# side and the worker bind side — the two must agree. The *_timeout knobs
# tune how the dev-side ar_cli waits on the (possibly remote, possibly
# slow) worker over the ssh -L tunnel.
worker:
  port: 9111
  ready_timeout: 20.0       # total seconds to wait for a freshly started daemon to answer /status
  ready_poll_interval: 0.5  # seconds between readiness polls during startup
  ready_probe_timeout: 1.5  # per-poll /status probe timeout during the readiness loop (short, kept responsive)
  status_timeout: 5.0       # seconds for a standalone /status probe (reachability check)

# Batch pre-flight verification (scripts/batch/verify.py), in seconds.
# tier2 cold JIT across ~50 cases on triton-ascend can take minutes for
# kernels with many constexpr specializations (maxpool3d, ...).
batch:
  tier1_timeout: 30    # smoke: import + tiny shape
  tier2_timeout: 600   # full correctness

# Speedup classification for batch reports (x relative to the ref).
metrics:
  speedup_improved_above: 1.05   # v > this → "improved"
  speedup_regress_below: 0.95    # v < this → "regress"; between → "on-par"

# Resume heartbeat: a task whose .heartbeat mtime is fresher than this
# (seconds) is assumed still driven by another session (scripts/resume.py).
resume:
  heartbeat_fresh_seconds: 180
